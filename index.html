<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tradutor do P</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
</head>
<body>
  <canvas id="bg-canvas"></canvas>
  <header>
    <div class="logo-container">
      <div class="logo-icon">
        <span class="pig-icon">🐖</span>
      </div>
      <h1>Tradutor do <span class="p-letter">P</span></h1>
    </div>
    <p class="subtitle">O Culto Sagrado da Língua Oculta</p>
  </header>

  <main>
    <div class="translator-container">
      <div class="panel input-panel">
        <div class="panel-header">
          <select id="source-lang">
            <option value="portugues">Português</option>
            <option value="espanhol">Espanhol</option>
            <option value="ingles">Inglês</option>
            <option value="frances">Francês</option>
          </select>
        </div>
        <textarea id="input-text" placeholder="Digite o texto para traduzir..." rows="8"></textarea>
        <div class="char-count"><span id="input-count">0</span> / 5000</div>
      </div>

      <div class="panel output-panel">
        <div class="panel-header">
          <select id="target-lang">
            <option value="lingua-p">Língua do P</option>
            <option value="portugues">Português</option>
          </select>
          <select id="variant" title="Variante da Língua do P">
            <option value="pe">Pê (Brasil)</option>
            <option value="double">Double Talk (Portugal)</option>
            <option value="pvowel">P+Vogal</option>
          </select>
        </div>
        <textarea id="output-text" placeholder="A tradução aparecerá aqui..." rows="8" readonly></textarea>
        <div class="output-actions">
          <button id="copy-btn" title="Copiar">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
              <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
            </svg>
            Copiar
          </button>
          <button id="speak-btn" title="Ouvir">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
              <path d="M15.54 8.46a5 5 0 010 7.07"/>
              <path d="M19.07 4.93a10 10 0 010 14.14"/>
            </svg>
            Ouvir
          </button>
        </div>
      </div>
    </div>

    <div class="variant-info" id="variant-info">
      <p id="variant-description"><strong>Pê (Brasil):</strong> Insere "pê" antes de cada sílaba. Ex: "gato" → "pêga pêto"</p>
    </div>


  </main>

  <footer>
    <p>Tradutor do P &mdash; A cifra sagrada dos iniciados</p>
  </footer>

  <script src="background.js"></script>
  <script src="script.js"></script>
</body>
</html>
